name: tarwati
description: "Your intelligent financial assistant"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  go_router: ^17.2.2
  get_it: ^9.2.1
  flutter_screenutil: ^5.9.3
  equatable: ^2.0.8
  freezed_annotation: ^3.1.0
  flutter_svg: ^2.2.4
  skeletonizer: ^2.1.3
  expandable_page_view: ^1.3.0
  cached_network_image: ^3.4.1
  pin_code_fields: ^9.3.0
  flutter_rating_bar: ^4.0.1
  carousel_slider: ^5.1.2
  flutter_staggered_animations: ^1.1.1
  timeago: ^3.7.1
  flutter_secure_storage: ^8.1.0
  wakelock_plus: ^1.6.0
  image_picker: ^1.2.1
  device_info_plus: ^13.1.0
  webview_flutter: ^4.13.1
  intl: ^0.20.2
  slang: ^4.14.0
  retrofit: ^4.9.2
  logger: ^2.7.0
  pretty_dio_logger: ^1.4.0
  json_annotation: ^4.11.0
  dio: ^5.9.2
  slang_flutter: ^4.14.0
  connectivity_plus: ^7.1.1
  shared_preferences: ^2.5.5
  flutter_riverpod: ^3.3.1
  animations: ^2.2.0
  lottie: ^3.3.3
  flutter_slidable: ^4.0.3
  internet_connection_checker_plus: ^2.9.1+2
  flutter_hooks: ^0.21.3+1
  url_launcher: ^6.3.2
  shimmer_animation: ^2.2.2+1
  flutter_native_splash: ^2.4.7
  flutter_animate: ^4.5.2
  ## packages you gonna need after
  #just_audio: ^0.10.5
  #record: ^6.2.0
  #google_sign_in: ^7.2.0
  #firebase_core: ^4.7.0
  #firebase_messaging: ^16.2.0
  #pusher_reverb_flutter: ^0.0.4
  #path_provider: ^2.1.5
  #open_filex: ^4.7.0
  package_info_plus: ^10.1.0
  change_app_package_name: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.14.1
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  retrofit_generator: ^10.2.5
  flutter_gen_runner: ^5.14.0
  #riverpod_generator: ^4.0.3

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/i18n/
    - assets/lottie/

  fonts:
    - family: IBM Plex Sans
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-ExtraLight.ttf
          weight: 100
        - asset: assets/fonts/IBMPlexSansArabic-Thin.ttf
          weight: 200
        - asset: assets/fonts/IBMPlexSansArabic-Light.ttf
          weight: 300
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
    - family: SF Pro Display
      fonts:
        - asset: assets/fonts/SFProDisplayBold.ttf
          weight: 700
        - asset: assets/fonts/SFProDisplayRegular.ttf
          weight: 400
        - asset: assets/fonts/SFProDisplaySemibold.ttf
          weight: 600
        - asset: assets/fonts/SFProDisplayMedium.ttf
          weight: 500
    - family: Mona-Sans
      fonts:
        - asset: assets/fonts/MonaSansMedium.ttf
          weight: 500